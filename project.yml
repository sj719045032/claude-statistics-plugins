name: ClaudeStatisticsPlugins
options:
  bundleIdPrefix: com.tinystone
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en

# Pull the SDK from the host repo's Package.swift. This catalog repo
# does NOT bundle a copy of `ClaudeStatisticsKit` — every plugin
# target depends on it through SwiftPM, the same way third-party
# `.csplugin` projects will. The host repo's Package.swift declares
# the SDK as a `.binaryTarget(url:, checksum:)` referencing an
# `.xcframework` published as a `sdk-v<x.y.z>` GitHub release asset
# — SwiftPM auto-fetches and unzips that binary at resolve time.
packages:
  # SDK_MODE_BEGIN — managed by scripts/sdk-mode.sh
  ClaudeStatisticsKit:
    url: https://github.com/sj719045032/claude-statistics
    branch: main
  # SDK_MODE_END

settingGroups:
  pluginBundle:
    base:
      WRAPPER_EXTENSION: csplugin
      MACH_O_TYPE: mh_bundle
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
      SKIP_INSTALL: NO
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGN_STYLE: Automatic
      SWIFT_STRICT_CONCURRENCY: minimal

targets:
  AlacrittyPlugin:
    type: bundle
    platform: macOS
    sources:
      - path: Sources/AlacrittyPlugin
    dependencies:
      - package: ClaudeStatisticsKit
        product: ClaudeStatisticsKit
    info:
      path: Sources/AlacrittyPlugin/Info.plist
      properties:
        CFBundleIdentifier: com.tinystone.AlacrittyPlugin
        CFBundleName: AlacrittyPlugin
        CFBundleExecutable: AlacrittyPlugin
        CFBundlePackageType: BNDL
        NSPrincipalClass: AlacrittyPlugin
        CSPluginManifest:
          id: org.alacritty
          kind: terminal
          displayName: Alacritty
          version: 1.0.0
          minHostAPIVersion: 0.1.0
          permissions: []
          principalClass: AlacrittyPlugin
          category: terminal
    settings:
      groups: [pluginBundle]
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tinystone.AlacrittyPlugin
        PRODUCT_NAME: AlacrittyPlugin

  ClaudeAppPlugin:
    type: bundle
    platform: macOS
    sources:
